name: 程序部署

on:
  push:
    branches:
      - master

jobs:
  build-push:
    if: contains(github.event.head_commit.message, '自动更新') || contains(github.event.head_commit.message, 'exe')
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_VERSION: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          # 获取git commit消息并去除"自动更新"
      - name: Get commit message and clean it
        id: get_commit_message
        run: |
          # 获取最新的 commit 消息
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          
          # 清理 commit 消息：去除换行符和特殊字符
          CLEANED_MESSAGE=$(echo "$COMMIT_MESSAGE" | tr -d '\n' | sed 's/自动更新//g')
          
          # 将清理后的 commit 消息设置为环境变量
          echo "cleaned_message=$CLEANED_MESSAGE" >> $GITHUB_ENV
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (with fixes)
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Zip .output directory
        run: zip -r app.zip .output

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: Release v${{ env.APP_VERSION }}
          files: app.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Release Asset Temporary URL
        id: get_download_url
        run: |
          ASSET_ID=$(gh api repos/${{ github.repository }}/releases/tags/v${{ env.APP_VERSION }} --jq '.assets[] | select(.name=="app.zip") | .id')
          TEMP_URL=$(curl -s -D - -o /dev/null --max-redirs 0 \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${{ github.repository }}/releases/assets/${ASSET_ID}" \
            | grep -i "^location:" | awk '{print $2}' | tr -d '\r')
          echo "url=${TEMP_URL}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To UpgradeLink
        id: push-upgradelink
        uses: toolsetlink/upgradelink-action@3.0.2
        with:
          access_key: ${{ secrets.UPGRADE_LINK_ACCESS_KEY }}
          access_secret: ${{ secrets.UPGRADE_LINK_ACCESS_SECRET }}
          config: |
            {
              "app_type": "file",
              "request": {
                "app_key": "${{ secrets.UPGRADE_LINK_APP_KEY }}",
                "version": "${{ env.APP_VERSION }}",
                "url": "${{ steps.get_download_url.outputs.url }}",
                "prompt_upgrade_content": "新版本已发布，包含重要功能更新和 bug 修复"
              }
            }